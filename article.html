<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Artikel... | Kopi Kuy Group</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif']
                    },
                    colors: { corporate: '#0f172a', accent: '#2563eb' }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-slate-50 font-sans text-slate-800 antialiased flex flex-col min-h-screen">

    <nav class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <a href="index.html" class="font-bold text-xl tracking-tight text-corporate hover:text-accent transition">
                Wara <span class="text-accent">Group</span>
            </a>
            <a href="index.html" class="text-sm font-semibold text-slate-600 hover:text-corporate flex items-center gap-2">
                &larr; Kembali ke Berita
            </a>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
        <article id="articleContent" class="bg-white p-8 md:p-12 rounded-2xl shadow-sm border border-slate-100">
            
            <div class="animate-pulse flex flex-col space-y-6">
                <div class="h-4 bg-slate-200 rounded w-1/4 mx-auto"></div>
                <div class="h-10 bg-slate-200 rounded w-3/4 mx-auto"></div>
                <div class="h-64 bg-slate-200 rounded w-full"></div>
                <div class="space-y-3">
                    <div class="h-4 bg-slate-200 rounded"></div>
                    <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                </div>
            </div>

        </article>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-8 border-t border-slate-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm">
            &copy; 2026 Wara Group. All rights reserved.
        </div>
    </footer>

    <script>
        // --- YOUR SUPABASE KEYS HERE ---
        const SUPABASE_URL = 'https://vukiwkaowsvlxsbmisjr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_M0_lWHOn7NytFPK39sEgUQ_M1P0JnCL';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadArticle() {
            const container = document.getElementById('articleContent');
            
            // Emulate $_GET['id']
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (!articleId) {
                container.innerHTML = `
                    <div class="text-center py-10">
                        <h2 class="text-2xl font-bold text-slate-900">Artikel Tidak Ditemukan</h2>
                        <p class="text-slate-500 mt-2">ID artikel tidak valid atau tidak disertakan dalam URL.</p>
                        <a href="index.html" class="mt-6 inline-block bg-corporate text-white px-6 py-2 rounded-lg text-sm font-semibold hover:bg-slate-800 transition">Kembali ke Beranda</a>
                    </div>`;
                return;
            }

            // Fetch the article
            const { data, error } = await _supabase
                .from('entries')
                .select('*')
                .eq('id', articleId)
                .single();

            if (error || !data) {
                container.innerHTML = `
                    <div class="text-center py-10">
                        <h2 class="text-2xl font-bold text-slate-900">Terjadi Kesalahan</h2>
                        <p class="text-slate-500 mt-2">Dokumen yang Anda cari tidak tersedia di database.</p>
                    </div>`;
                console.error(error);
                return;
            }

            // Format date for the Indonesian locale
            const formattedDate = new Date(data.created_at).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
            
            // Update browser tab title dynamically
            document.title = data.title + " | Wara Group";

            // Inject the data into the HTML
            // Note the "prose prose-slate prose-lg font-serif" classes on the bottom div!
            container.innerHTML = `
                <header class="mb-10 text-center border-b border-slate-100 pb-8">
                    <span class="inline-block px-4 py-1.5 bg-slate-50 border border-slate-200 text-accent text-xs font-bold uppercase tracking-widest rounded-full mb-6 shadow-sm">
                        ${data.category || 'General'}
                    </span>
                    <h1 class="text-3xl md:text-5xl font-bold text-slate-900 leading-tight mb-6">${data.title}</h1>
                    <div class="text-sm text-slate-500 font-medium">
                        Diterbitkan pada <time>${formattedDate}</time>
                    </div>
                </header>

                ${data.image_url ? `
                    <figure class="mb-12">
                        <img src="${data.image_url}" class="w-full h-auto max-h-[450px] object-cover rounded-xl shadow-sm bg-slate-100" alt="Cover Image">
                    </figure>
                ` : ''}

                <div class="prose prose-slate prose-lg max-w-none font-serif text-slate-700 leading-relaxed">
                    ${data.description}
                </div>
            `;
        }

        // Run when page loads
        document.addEventListener('DOMContentLoaded', loadArticle);
    </script>
</body>
</html>
