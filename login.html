<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; }
        .login-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #555; }
        #message { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Admin Panel</h2>
        <input type="email" id="emailInput" placeholder="Admin Email">
        <input type="password" id="passwordInput" placeholder="Password">
        <button onclick="login()">Sign In</button>
        <p id="message"></p>
    </div>

    <script>
        // PASTE YOUR SUPABASE URL AND ANON KEY HERE
        const SUPABASE_URL = 'https://vukiwkaowsvlxsbmisjr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_M0_lWHOn7NytFPK39sEgUQ_M1P0JnCL';
        // 1. Your Credentials (Make sure these are inside the quotes!)
        
        // 2. Initialize the client with a unique name
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 3. Debug check: Let's see if the client actually loaded the auth part
        console.log("Supabase Client check:", _supabase);
        if (!_supabase.auth) {
            console.error("Auth module failed to load. Check your URL and Key!");
        }

        async function login() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const messageBox = document.getElementById('message');

            messageBox.innerText = "Authenticating...";
            messageBox.style.color = "black";

            try {
                // USE _supabase HERE (the variable we created above)
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    messageBox.style.color = "red";
                    messageBox.innerText = error.message;
                } else {
                    messageBox.style.color = "green";
                    messageBox.innerText = "Login successful! Redirecting...";
                    
                    setTimeout(() => {
                        window.location.href = "admin-dashboard.html";
                    }, 1000);
                }
            } catch (err) {
                console.error("Unexpected error:", err);
                messageBox.innerText = "A system error occurred. Check the console.";
            }
        }
        // Listen for "Enter" key on the password input
        document.getElementById('passwordInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault(); // Stops the page from refreshing
                login(); // Assuming your login function is named login()
            }
        });
    </script>
</body>
</html>
