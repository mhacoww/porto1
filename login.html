<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Wara ID</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { corporate: '#0f172a', accent: '#2563eb' }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen flex flex-col items-center justify-center p-4">

    <div class="absolute top-6 left-6">
        <a href="index.html" class="text-sm font-semibold text-slate-500 hover:text-slate-900 transition flex items-center gap-2">
            &larr; Kembali ke Beranda
        </a>
    </div>

    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-lg border border-slate-100 max-w-md w-full">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-tight text-corporate mb-2">Wara ID <span class="text-accent">Admin</span></h1>
            <p class="text-sm text-slate-500">Masukkan kredensial Anda untuk mengakses dasbor kontrol.</p>
        </div>

        <div id="message" class="hidden mb-4 p-3 rounded-lg text-sm font-semibold text-center"></div>

        <form id="loginForm" class="space-y-5" onsubmit="event.preventDefault();">
            
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email Perusahaan</label>
                <input type="email" id="email" required placeholder="admin@kopikuy.com" 
                       class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition bg-slate-50 focus:bg-white">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Kata Sandi</label>
                <input type="password" id="password" required placeholder="••••••••" 
                       class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition bg-slate-50 focus:bg-white">
            </div>

            <button type="button" id="loginBtn" onclick="login()" 
                    class="w-full bg-corporate hover:bg-slate-800 text-white font-semibold py-3.5 rounded-lg transition shadow-md mt-2">
                Masuk ke Dasbor
            </button>

        </form>

    </div>

    <script>
        // --- YOUR SUPABASE KEYS HERE ---
        const SUPABASE_URL = 'https://vukiwkaowsvlxsbmisjr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_M0_lWHOn7NytFPK39sEgUQ_M1P0JnCL';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // UI Feedback Helper
        function showMessage(text, isError = false) {
            const msgBox = document.getElementById('message');
            msgBox.textContent = text;
            msgBox.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'bg-emerald-50', 'text-emerald-600');
            
            if (isError) {
                msgBox.classList.add('bg-red-50', 'text-red-600');
            } else {
                msgBox.classList.add('bg-emerald-50', 'text-emerald-600');
            }
        }

        // Login Function
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            // Basic validation
            if (!email || !password) {
                showMessage("Harap isi email dan kata sandi.", true);
                return;
            }

            // Loading state
            btn.innerText = "Memverifikasi...";
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                showMessage("Login gagal: " + error.message, true);
                // Reset button
                btn.innerText = "Masuk ke Dasbor";
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            } else {
                showMessage("Login berhasil! Mengalihkan...", false);
                window.location.href = "admin-dashboard.html";
            }
        }

        // 1. Wait for the HTML to fully load first!
        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');

            // 2. Attach the bulletproof Enter key listener
            if (passwordInput && loginBtn) {
                passwordInput.addEventListener('keypress', function(event) {
                    if (event.key === 'Enter') {
                        event.preventDefault(); 
                        loginBtn.click(); 
                    }
                });
            } else {
                console.error("Developer Warning: Cannot find 'password' or 'loginBtn' IDs in the HTML.");
            }
        });
    </script>
</body>
</html>
