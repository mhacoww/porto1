<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Wara ID</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { corporate: '#0f172a', accent: '#2563eb' }
                }
            }
        }
    </script>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen">

    <nav class="bg-corporate text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <span class="font-bold text-xl tracking-tight">Wara ID <span class="text-accent">Admin</span></span>
                </div>
                <div class="flex items-center gap-6">
                    <a href="index.html" class="text-sm text-slate-300 hover:text-white transition">&larr; Lihat Situs Publik</a>
                    <div class="flex items-center gap-4 border-l border-slate-700 pl-6">
                        <span id="userEmail" class="text-sm font-medium text-slate-300"></span>
                        <button onclick="logout()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-sm font-semibold transition">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 space-y-8">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h3 id="formTitle" class="text-lg font-bold text-slate-900 mb-6">Tulis Artikel Baru</h3>
                <form id="entryForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Judul Artikel</label>
                        <input type="text" id="title" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Sektor / Kategori</label>
                        <select id="category" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition bg-white">
                            <option value="">Memuat kategori...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">URL Gambar Cover (Opsional)</label>
                        <input type="text" id="imageUrl" placeholder="https://..." class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Isi Konten</label>
                        <div class="border border-slate-300 rounded-lg overflow-hidden bg-white">
                            <div id="editor-container" class="h-64"></div>
                        </div>
                    </div>
                    
                    <div class="pt-2 flex gap-3">
                        <button type="submit" id="submitBtn" class="flex-1 bg-accent hover:bg-blue-700 text-white py-2.5 rounded-lg font-semibold shadow-sm transition">Publikasikan</button>
                        <button type="button" id="cancelBtn" onclick="cancelEdit()" class="hidden flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-lg font-semibold transition">Batal Edit</button>
                    </div>
                </form>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h3 class="text-lg font-bold text-slate-900 mb-4">Manajemen Kategori</h3>
                
                <div class="flex gap-2 mb-6">
                    <input type="text" id="newCategoryName" placeholder="Nama kategori baru..." class="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition">
                    <button onclick="addCategory()" class="bg-corporate hover:bg-slate-800 text-white px-4 py-2 rounded-lg font-semibold transition">Tambah</button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-200 text-xs uppercase text-slate-500 bg-slate-50">
                                <th class="p-3 font-semibold">Nama Kategori</th>
                                <th class="p-3 font-semibold text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="categoriesBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-8">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                    <h3 class="text-lg font-bold text-slate-900">Database Artikel</h3>
                    
                    <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                        <input type="text" id="adminSearch" placeholder="Cari judul artikel..." oninput="filterEntries()" class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition w-full sm:w-64">
                        <select id="adminFilterCategory" onchange="filterEntries()" class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none transition bg-white w-full sm:w-48">
                            <option value="">Semua Kategori</option>
                        </select>
                    </div>
                </div>

                <div class="overflow-x-auto border border-slate-200 rounded-lg">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead>
                            <tr class="border-b border-slate-200 text-xs uppercase text-slate-500 bg-slate-50">
                                <th class="p-4 font-semibold">Judul Artikel</th>
                                <th class="p-4 font-semibold w-40">Kategori</th>
                                <th class="p-4 font-semibold w-32 text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="entriesBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>

                <div id="paginationControls" class="flex justify-between items-center mt-6 pt-4 border-t border-slate-100">
                    <button id="prevPageBtn" onclick="changePage(-1)" class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition disabled:opacity-50 disabled:cursor-not-allowed">
                        &larr; Sebelumnya
                    </button>
                    <span id="pageInfo" class="text-sm font-semibold text-slate-600">Halaman 1 dari 1</span>
                    <button id="nextPageBtn" onclick="changePage(1)" class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition disabled:opacity-50 disabled:cursor-not-allowed">
                        Selanjutnya &rarr;
                    </button>
                </div>
            </div>
        </div>

    </main>

    <div id="deleteModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-slate-900 bg-opacity-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full mx-4 overflow-hidden transform transition-all">
            <div class="p-6 text-center">
                <div class="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-slate-900 mb-2">Konfirmasi Hapus</h3>
                <p id="deleteModalText" class="text-slate-500 text-sm mb-6">Apakah Anda yakin ingin menghapus item ini? Tindakan ini tidak dapat dibatalkan.</p>
                
                <div class="flex gap-3">
                    <button onclick="closeDeleteModal()" class="flex-1 bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 py-2.5 rounded-lg font-semibold transition">Batal</button>
                    <button onclick="executeDelete()" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-lg font-semibold shadow-sm transition">Ya, Hapus</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>
    
    <script>
        // --- YOUR CREDENTIALS HERE ---
        const SUPABASE_URL = 'https://vukiwkaowsvlxsbmisjr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_M0_lWHOn7NytFPK39sEgUQ_M1P0JnCL';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // State Variables
        let editingId = null;
        let allEntries = []; 
        let currentFilteredData = [];
        let currentPage = 1;
        const itemsPerPage = 5; // Configured for your dataset size
        // Modal State Variables
        let itemToDeleteId = null;
        let itemToDeleteType = null; // Will be 'article' or 'category'
        

        // --- CUSTOM DELETE MODAL LOGIC ---
        function showDeleteModal(id, type, itemName) {
            itemToDeleteId = id;
            itemToDeleteType = type;
            
            // Customize the text based on what we are deleting
            const textElement = document.getElementById('deleteModalText');
            if (type === 'category') {
                textElement.innerHTML = `Yakin ingin menghapus kategori <strong>"${itemName}"</strong>?`;
            } else {
                textElement.innerHTML = `Yakin ingin menghapus artikel ini?`;
            }

            // Show the modal
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function closeDeleteModal() {
            itemToDeleteId = null;
            itemToDeleteType = null;
            document.getElementById('deleteModal').classList.add('hidden');
        }

        async function executeDelete() {
            // Hide the modal immediately for smooth UX
            document.getElementById('deleteModal').classList.add('hidden');

            if (itemToDeleteType === 'category') {
                const { error } = await _supabase.from('categories').delete().eq('id', itemToDeleteId);
                if (error) showToast("Gagal menghapus kategori.", 'error');
                else {
                    showToast("Kategori berhasil dihapus.", 'success');
                    loadCategories();
                }
            } 
            else if (itemToDeleteType === 'article') {
                const { error } = await _supabase.from('entries').delete().eq('id', itemToDeleteId);
                if (error) showToast("Gagal menghapus artikel.", 'error');
                else {
                    showToast("Artikel berhasil dihapus.", 'success');
                    loadEntries();
                }
            }
            
            // Reset state
            itemToDeleteId = null;
            itemToDeleteType = null;
        }

        // Initialize Quill Editor
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'Mulai menulis konten di sini...',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    [{ 'header': [1, 2, 3, false] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean']
                ]
            }
        });

        // --- TOAST NOTIFICATION SYSTEM ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            // Set colors based on success or error
            const bgColor = type === 'success' ? 'bg-emerald-600' : 'bg-red-600';
            const icon = type === 'success' ? '✓' : '✕';

            // Tailwind styling with smooth slide-up animation
            toast.className = `${bgColor} text-white px-5 py-3 rounded-lg shadow-xl transform transition-all duration-300 translate-y-10 opacity-0 flex items-center gap-3 font-medium text-sm`;
            
            toast.innerHTML = `
                <span class="flex items-center justify-center w-5 h-5 rounded-full bg-white bg-opacity-20 font-bold">${icon}</span>
                <span>${message}</span>
            `;

            container.appendChild(toast);

            // Trigger the animation slightly after adding it to the DOM
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);

            // Fade out and remove after 3 seconds
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300); // Wait for animation to finish before deleting
            }, 3000);
        }

        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) {
                window.location.href = "login.html";
            } else {
                document.getElementById('userEmail').innerText = user.email;
                await loadCategories(); 
                await loadEntries();
            }
        }

        // --- CATEGORY LOGIC (With Cascading Updates) ---
        async function loadCategories() {
            const { data, error } = await _supabase.from('categories').select('*').order('name');
            if (error) return console.error(error);

            const select = document.getElementById('category');
            select.innerHTML = '<option value="">Pilih Kategori...</option>';
            
            const filterSelect = document.getElementById('adminFilterCategory');
            filterSelect.innerHTML = '<option value="">Semua Kategori</option>';
            
            const tbody = document.getElementById('categoriesBody');
            tbody.innerHTML = '';

            data.forEach(cat => {
                select.innerHTML += `<option value="${cat.name}">${cat.name}</option>`;
                filterSelect.innerHTML += `<option value="${cat.name}">${cat.name}</option>`;
                
                // Tailwind buttons for Category Table
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-3 text-sm font-medium text-slate-700">${cat.name}</td>
                        <td class="p-3 text-right">
                            <button onclick="editCategory(${cat.id}, '${cat.name}')" class="px-2 py-1 bg-amber-50 text-amber-700 text-xs font-semibold rounded hover:bg-amber-100 transition mr-1">Edit</button>
                            <button onclick="checkAndShowCategoryModal(${cat.id}, '${cat.name}')" class="px-2 py-1 bg-red-50 text-red-600 text-xs font-semibold rounded hover:bg-red-100 transition">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function addCategory() {
            const name = document.getElementById('newCategoryName').value;
            if (!name) return;
            const { error } = await _supabase.from('categories').insert([{ name }]);
            if (error) {
                showToast("Gagal menambah kategori.", 'error');
            } else {
                showToast("Kategori baru ditambahkan!", 'success');
                document.getElementById('newCategoryName').value = '';
                loadCategories();
            }
        }

        async function editCategory(id, oldName) {
            const newName = prompt("Ubah nama kategori:", oldName);
            if (!newName || newName.trim() === "" || newName === oldName) return;

            const { error: catError } = await _supabase.from('categories').update({ name: newName.trim() }).eq('id', id);
            if (catError) { alert("Gagal mengubah kategori: " + catError.message); return; }

            const { error: entryError } = await _supabase.from('entries').update({ category: newName.trim() }).eq('category', oldName);
            if (entryError) alert("Kategori diubah, tapi gagal memperbarui artikel: " + entryError.message);
            else { loadCategories(); loadEntries(); }
        }

        function checkAndShowCategoryModal(id, categoryName) {
            // Safety Check: Are articles using this?
            const inUse = allEntries.some(item => item.category === categoryName);
            if (inUse) {
                showToast(`Kategori "${categoryName}" masih digunakan oleh artikel!`, 'error');
                return; 
            }
            // If safe, show our custom modal
            showDeleteModal(id, 'category', categoryName);
        }

        // --- ARTICLE LOGIC (With Search, Filter & Pagination) ---
        async function loadEntries() {
            const { data, error } = await _supabase.from('entries').select('*').order('created_at', { ascending: false });
            if (data) {
                allEntries = data; 
                filterEntries();   
            }
        }

        function filterEntries() {
            const searchQuery = document.getElementById('adminSearch').value.toLowerCase();
            const selectedCategory = document.getElementById('adminFilterCategory').value;

            currentFilteredData = allEntries.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(searchQuery);
                const matchesCategory = selectedCategory === "" || item.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            currentPage = 1; 
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('entriesBody');
            const paginationBlock = document.getElementById('paginationControls');
            tbody.innerHTML = '';
            
            if (currentFilteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center p-8 text-slate-500">Tidak ada artikel yang ditemukan.</td></tr>';
                paginationBlock.style.display = 'none';
                return;
            }

            paginationBlock.style.display = 'flex';

            const totalPages = Math.ceil(currentFilteredData.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedData = currentFilteredData.slice(startIndex, endIndex);

            paginatedData.forEach(item => {
                // Tailwind styling injected into the table rows
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition group">
                        <td class="p-4 text-sm font-semibold text-slate-800 truncate max-w-[200px]">${item.title}</td>
                        <td class="p-4 text-sm text-slate-600"><span class="bg-slate-100 text-slate-700 px-2 py-1 rounded text-xs font-medium">${item.category}</span></td>
                        <td class="p-4 text-right">
                            <button onclick="startEdit(${item.id})" class="px-3 py-1.5 bg-amber-50 text-amber-700 hover:bg-amber-100 text-xs font-semibold rounded-md transition mr-2">Edit</button>
                            <button onclick="showDeleteModal(${item.id}, 'article')" class="px-3 py-1.5 bg-red-50 text-red-600 hover:bg-red-100 text-xs font-semibold rounded-md transition">Hapus</button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('pageInfo').innerText = `Halaman ${currentPage} dari ${totalPages}`;
            
            const prevBtn = document.getElementById('prevPageBtn');
            const nextBtn = document.getElementById('nextPageBtn');
            
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;
        }

        function changePage(direction) {
            currentPage += direction;
            renderTable();
        }

        // --- FORM HANDLING ---
        document.getElementById('entryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                description: quill.root.innerHTML, 
                image_url: document.getElementById('imageUrl').value
            };

            let error;
            if (editingId) {
                const res = await _supabase.from('entries').update(payload).eq('id', editingId);
                error = res.error;
            } else {
                const res = await _supabase.from('entries').insert([payload]);
                error = res.error;
            }

            if (error) {
                showToast("Gagal menyimpan artikel: " + error.message, 'error');
            } else {
                showToast(editingId ? "Artikel berhasil diperbarui!" : "Artikel baru berhasil dipublikasikan!", 'success');
                cancelEdit(); 
                loadEntries(); 
            }
        });

        function startEdit(id) {
            const item = allEntries.find(e => e.id === id);
            if (!item) return;
            
            editingId = item.id;
            
            document.getElementById('title').value = item.title;
            document.getElementById('category').value = item.category;
            document.getElementById('imageUrl').value = item.image_url || '';
            quill.root.innerHTML = item.description; 
            
            document.getElementById('formTitle').innerText = "Edit Artikel";
            document.getElementById('submitBtn').innerText = "Update Artikel";
            document.getElementById('cancelBtn').style.display = "block";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('entryForm').reset();
            quill.root.innerHTML = ''; 
            
            document.getElementById('formTitle').innerText = "Tulis Artikel Baru";
            document.getElementById('submitBtn').innerText = "Publikasikan";
            document.getElementById('cancelBtn').style.display = "none";
        }

        /* async function deleteEntry(id) {
            if (confirm("Yakin ingin menghapus artikel ini?")) {
                const { error } = await _supabase.from('entries').delete().eq('id', id);
                if (error) {
                    showToast("Gagal menghapus artikel.", 'error');
               } else {
                    showToast("Artikel berhasil dihapus.", 'success');
                    loadEntries();
                }
            }
        } */

        async function logout() {
            await _supabase.auth.signOut();
            window.location.href = "login.html";
        }

        // --- INIT & EVENT LISTENERS ---
        document.addEventListener('DOMContentLoaded', () => {
            init();
            
            // Listen for "Enter" key on the admin search input
            const adminSearchInput = document.getElementById('adminSearch');
            if(adminSearchInput) {
                adminSearchInput.addEventListener('keypress', function(event) {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        filterEntries();
                    }
                });
            }
        });
    </script>
</body>
</html>
